<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Température — X réel</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div class="app">

  <div class="header">
    <span class="header-title">Calcul X réel</span>
  </div>

  <!-- TMAX -->
  <div class="radio-bar tmax-bar">
    <label><input type="radio" name="tmax" value="22.5" onclick="calcul()"><span class="tab">22.5°</span></label>
    <label><input type="radio" name="tmax" value="37.5" checked onclick="calcul()"><span class="tab">37.5°</span></label>
    <label><input type="radio" name="tmax" value="47.5" onclick="calcul()"><span class="tab">47.5°</span></label>
  </div>

  <!-- INPUTS L / AT1 / AT2 -->
  <div class="inputs-card">
    <div class="input-row">
      <div class="field field-l">
        <label for="longueur">Longueur (L)</label>
        <input id="longueur" type="number" inputmode="decimal" step="any" placeholder="0" autofocus>
      </div>
      <div class="field field-at">
        <label for="at1">AT1</label>
        <input id="at1" type="number" inputmode="decimal" step="any" placeholder="0">
      </div>
      <div class="field field-at">
        <label for="at2">AT2</label>
        <input id="at2" type="number" inputmode="decimal" step="any" placeholder="0">
      </div>
    </div>
  </div>

  <!-- RÉSULTAT TEMPÉRATURE -->
  <div class="result-card">
    <div class="temp-display">
      <span id="tempVal">--°</span>
      <span class="temp-icon" id="tempIcon">❄️</span>
    </div>
    <div class="chemin-box">
      <div class="chemin-label">Chemin</div>
      <div id="chemin">C: 0</div>
    </div>
  </div>

  <!-- DISTANCE + AXE -->
  <div class="distance-axe">
    <div class="field">
      <label for="distance">Distance axe</label>
      <input id="distance" type="number" inputmode="decimal" step="any" placeholder="0">
    </div>
    <div class="axe-visual">
      <div class="axe-row">
        <div class="axe-label">AMONT</div>
        <div class="axe-track"><div class="axe-center"></div></div>
        <div class="axe-label">AVAL</div>
      </div>
      <div class="flags"><span>🚩</span><span>🚩</span></div>
    </div>
  </div>

  <!-- BLOCS CONNEXION / BRAS / PENDULE / IS -->
  <div class="blocs-distance hidden" id="blocsDistance">

    <div class="bloc bloc-cx" onclick="toggleBloc('cx')">
      <div class="bloc-header">
        <span class="bloc-name">Connexion</span>
        <span class="bloc-arrow" id="arr-cx">▼</span>
      </div>
      <div class="bloc-body" id="cxBloc">
        <div class="val-col"><div class="val-dir">Amont</div><div class="val-num" id="cxAmont">—</div></div>
        <div class="val-divider"></div>
        <div class="val-col"><div class="val-dir">Aval</div><div class="val-num" id="cxAval">—</div></div>
      </div>
    </div>

    <div class="bloc bloc-bras" onclick="toggleBloc('bras')">
      <div class="bloc-header">
        <span class="bloc-name">Bras</span>
        <span class="bloc-arrow" id="arr-bras">▼</span>
      </div>
      <div class="bloc-body" id="brasBloc">
        <div class="val-col"><div class="val-dir">Amont</div><div class="val-num" id="brasAmont">—</div></div>
        <div class="val-divider"></div>
        <div class="val-col"><div class="val-dir">Aval</div><div class="val-num" id="brasAval">—</div></div>
      </div>
    </div>

    <div class="bloc bloc-pendule" onclick="toggleBloc('pendule')">
      <div class="bloc-header">
        <span class="bloc-name">Pendule</span>
        <span class="bloc-arrow" id="arr-pendule">▼</span>
      </div>
      <div class="bloc-body" id="penduleBloc">
        <div class="val-col"><div class="val-dir">Amont</div><div class="val-num" id="penduleAmont">—</div></div>
        <div class="val-divider"></div>
        <div class="val-col"><div class="val-dir">Aval</div><div class="val-num" id="penduleAval">—</div></div>
      </div>
    </div>

    <div class="bloc bloc-is" onclick="toggleBloc('is')">
      <div class="bloc-header">
        <span class="bloc-name">IS Régulariser</span>
        <span class="bloc-arrow" id="arr-is">▼</span>
      </div>
      <div class="bloc-body" id="isBloc">
        <div class="val-col"><div class="val-dir">Amont</div><div class="val-num" id="isRegAmont">—</div></div>
        <div class="val-divider"></div>
        <div class="val-col"><div class="val-dir">Aval</div><div class="val-num" id="isRegAval">—</div></div>
      </div>
    </div>

  </div>

  <!-- BLOC XMAX -->
  <div class="bloc bloc-xmax" onclick="toggleBloc('xmax')">
    <div class="xmax-header">
      <span class="bloc-name">Xmax / Ymax</span>
      <div class="at-inline" onclick="event.stopPropagation()">
        <label><input type="radio" name="nbAT" value="1" onclick="calcul()"><span class="atab">1 AT</span></label>
        <label><input type="radio" name="nbAT" value="2" checked onclick="calcul()"><span class="atab">2 AT</span></label>
      </div>
      <span class="bloc-arrow" id="arr-xmax">▼</span>
    </div>
    <div class="bloc-body" id="xmaxBloc" style="flex-direction:column;gap:8px;">

      <!-- Xmax / Ymax -->
      <div style="display:flex;gap:8px;">
        <div class="val-col">
          <div class="val-dir">Xmax</div>
          <div class="val-num" id="xmaxVal">—</div>
        </div>
        <div class="val-divider"></div>
        <div class="val-col">
          <div class="val-dir">Ymax</div>
          <div class="val-num" id="ymaxVal">—</div>
        </div>
      </div>

      <div class="inner-sep"></div>

      <!-- Saisie T° pour XThéo -->
      <div class="theo-input-row" onclick="event.stopPropagation()">
        <span class="theo-label">T° saisie</span>
        <input id="tSaisie" class="theo-input" type="number" inputmode="decimal" step="any" placeholder="ex: 18.5">
      </div>

      <!-- XThéo / YThéo + colonne cheminement optionnelle -->
      <div class="theo-row" id="theoRow">
        <div class="val-col">
          <div class="val-dir">XThéo</div>
          <div class="val-num" id="xtheoVal">—</div>
        </div>
        <div class="val-divider"></div>
        <div class="val-col">
          <div class="val-dir">YThéo</div>
          <div class="val-num" id="ytheoVal">—</div>
        </div>
        <div class="theo-ch" id="theoChCol">
          <div class="val-dir">Chemin</div>
          <div class="val-num" id="theoChVal">—</div>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
